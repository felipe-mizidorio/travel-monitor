<div style="background: #ffffff; border-radius: 12px; padding: 24px; margin-bottom: 16px;
           box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-left: 4px solid #2563eb;">

    <div style="font-size: 20px; font-weight: 700; color: #1e293b; margin-bottom: 12px;">
        ✈️ $origin → $destination
        <span style="font-size: 14px; font-weight: 400; color: #64748b; margin-left: 8px;">
            $airline
        </span>
    </div>

    <div style="color: #475569; font-size: 14px; margin-bottom: 16px;">
        📅 $departure_date → $return_date
    </div>

    <table style="width: 100%; border-collapse: separate; border-spacing: 8px;">
        <tr>
            <td style="background: #f0fdf4; border-radius: 8px; padding: 12px; text-align: center; width: 33%;">
                <div style="font-size: 11px; color: #16a34a; font-weight: 600;
                            text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px;">
                    Best Price
                </div>
                <div style="font-size: 24px; font-weight: 800; color: #15803d;">
                    $best_price $currency
                </div>
            </td>
            <td style="background: #f8fafc; border-radius: 8px; padding: 12px; text-align: center; width: 33%;">
                <div style="font-size: 11px; color: #64748b; font-weight: 600;
                            text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px;">
                    Your Max
                </div>
                <div style="font-size: 24px; font-weight: 800; color: #94a3b8;">
                    $max_price $currency
                </div>
            </td>
            <td style="background: #eff6ff; border-radius: 8px; padding: 12px; text-align: center; width: 33%;">
                <div style="font-size: 11px; color: #2563eb; font-weight: 600;
                            text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px;">
                    You Save
                </div>
                <div style="font-size: 24px; font-weight: 800; color: #1d4ed8;">
                    $savings_pct%
                </div>
            </td>
        </tr>
    </table>

</div>
