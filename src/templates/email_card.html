<div style="background: #ffffff; border-radius: 12px; padding: 20px; margin-bottom: 16px;
           box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-left: 4px solid #2563eb;">

    <div style="font-size: 18px; font-weight: 700; color: #1e293b; margin-bottom: 4px;">
        ✈️ $origin → $destination
    </div>
    <div style="font-size: 13px; color: #64748b; margin-bottom: 4px;">$airline</div>

    <div style="color: #475569; font-size: 14px; margin-bottom: 16px;">
        📅 $departure_date<br>
        🔙 $return_date
    </div>

    <table style="width: 100%; border-collapse: separate; border-spacing: 6px;">
        <tr>
            <td style="background: #f0fdf4; border-radius: 8px; padding: 10px 4px; text-align: center;">
                <div style="font-size: 10px; color: #16a34a; font-weight: 600;
                            text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px;">
                    Best Price
                </div>
                <div style="font-size: 18px; font-weight: 800; color: #15803d; white-space: nowrap;">
                    $best_price
                </div>
                <div style="font-size: 11px; color: #15803d;">$currency</div>
            </td>
            <td style="background: #f8fafc; border-radius: 8px; padding: 10px 4px; text-align: center;">
                <div style="font-size: 10px; color: #64748b; font-weight: 600;
                            text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px;">
                    Your Max
                </div>
                <div style="font-size: 18px; font-weight: 800; color: #94a3b8; white-space: nowrap;">
                    $max_price
                </div>
                <div style="font-size: 11px; color: #94a3b8;">$currency</div>
            </td>
            <td style="background: #eff6ff; border-radius: 8px; padding: 10px 4px; text-align: center;">
                <div style="font-size: 10px; color: #2563eb; font-weight: 600;
                            text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px;">
                    You Save
                </div>
                <div style="font-size: 18px; font-weight: 800; color: #1d4ed8;">
                    $savings_pct%
                </div>
            </td>
        </tr>
    </table>

</div>
